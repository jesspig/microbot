# MicroAgent 配置文件
# 配置说明：https://github.com/jesspig/micro-agent/docs

# ============================================================================
# Agent 配置
# ============================================================================
agents:
  defaults:
    # Agent 工作目录（所有文件操作都在此目录下进行）
    workspace: "~/.micro-agent/workspace"

    # 默认模型，格式为 <provider>/<model> 或 <provider>/<subprovider>/<model>
    # 示例：
    #   openai/gpt-4o
    #   anthropic/claude-3-5-sonnet
    #   glm/glm-4-plus
    #   openrouter/stepfun/step-3.5-flash:free   # 三段式：provider/subprovider/model
    model: ""

    maxTokens: 8192          # 模型单次回复的最大 token 数
    temperature: 0.7           # 温度参数，控制输出随机性 (0-1)
    maxToolIterations: 40      # 工具调用最大迭代次数，防止无限循环
    heartbeatInterval: 30      # 心跳间隔（分钟），用于定时任务检查

# ============================================================================
# 模型提供商配置
# ============================================================================
#
# 配置说明：
# - baseUrl: API 基础 URL
# - apiKey: API 密钥，支持 ${ENV_VAR} 语法引用环境变量
# - models: 支持的模型列表（可为空，仅使用 agents.defaults.model 时）
#
# Provider 通过 URL 自动识别类型，未匹配的 URL 使用 OpenAI 兼容格式
#
# 模型命名格式：
# - 标准: <provider>/<model>        # 如 glm/glm-4-plus
# - 多段: <provider>/<subprovider>/<model>  # 如 openrouter/stepfun/step-3.5-flash:free
#
# ----------------------------------------------------------------------------

providers:
  # --------------------------------------------------------------------------
  # OpenAI - 官网：https://platform.openai.com/
  # API Key: https://platform.openai.com/api-keys
  # 模型: gpt-4o、gpt-4o-mini、gpt-4-turbo、o1、o1-mini 等
  # --------------------------------------------------------------------------
  openai:
    baseUrl: "https://api.openai.com/v1"
    apiKey: "${OPENAI_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # Anthropic Claude - 官网：https://www.anthropic.com/
  # API Key: https://console.anthropic.com/
  # 模型: claude-3-5-sonnet-latest、claude-3-5-haiku-latest 等
  # 特点: 原生 Messages API，支持 extended thinking、prompt caching
  # --------------------------------------------------------------------------
  anthropic:
    baseUrl: "https://api.anthropic.com/v1"
    apiKey: "${ANTHROPIC_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # Ollama 本地模型 - 官网：https://ollama.com/
  # 启动: ollama serve
  # 拉取: ollama pull qwen2.5
  # 模型: ollama list 查看本地模型
  # --------------------------------------------------------------------------
  ollama:
    baseUrl: "http://localhost:11434"
    apiKey: ""
    models: []

  # --------------------------------------------------------------------------
  # DeepSeek - 官网：https://www.deepseek.com/
  # API Key: https://platform.deepseek.com/
  # 模型: deepseek-chat、deepseek-reasoner 等
  # 特点: 支持 thinking 模式（reasoning_content）
  # --------------------------------------------------------------------------
  deepseek:
    baseUrl: "https://api.deepseek.com/v1"
    apiKey: "${DEEPSEEK_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # GLM (智谱 BigModel / Z.AI)
  # BigModel: https://www.bigmodel.cn/ | API Key: https://open.bigmodel.cn/
  # Z.AI: https://z.ai/ | API Key: https://z.ai/dashboard/apikeys
  # 模型: glm-4-plus、glm-4-flash、glm-4.7、glm-5 等
  # 特点: 支持 thinking、web_search、结构化输出
  # Coding Plan 端点:
  #   BigModel: https://open.bigmodel.cn/api/coding/paas/v4
  #   Z.AI: https://api.z.ai/api/coding/paas/v4
  # --------------------------------------------------------------------------
  glm:
    baseUrl: "https://open.bigmodel.cn/api/paas/v4"
    apiKey: "${BIGMODEL_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # Moonshot Kimi - 官网：https://www.moonshot.cn/
  # API Key: https://platform.moonshot.cn/
  # 模型: moonshot-v1-8k、moonshot-v1-32k、moonshot-v1-128k
  # --------------------------------------------------------------------------
  moonshot:
    baseUrl: "https://api.moonshot.cn/v1"
    apiKey: "${MOONSHOT_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # MiniMax 海螺 AI - 官网：https://www.minimaxi.com/
  # API Key: https://platform.minimaxi.com/
  # 模型: MiniMax-M2、MiniMax-M1 等
  # 特点: 支持 reasoning_split 模式
  # --------------------------------------------------------------------------
  minimax:
    baseUrl: "https://api.minimax.chat/v1"
    apiKey: "${MINIMAX_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # OpenRouter 多模型聚合 - 官网：https://openrouter.ai/
  # API Key: https://openrouter.ai/keys
  # 模型: https://openrouter.ai/models
  # 特点: 支持 100+ 模型，自动路由，支持 plugins、reasoning effort 等
  # --------------------------------------------------------------------------
  openrouter:
    baseUrl: "https://openrouter.ai/api/v1"
    apiKey: "${OPENROUTER_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # NVIDIA NIM - API: https://docs.api.nvidia.com/
  # API Key: https://build.nvidia.com/
  # 模型: meta/llama-3.1-70b-instruct、deepseek-ai/deepseek-r1 等
  # 特点: 支持 guided_json/guided_regex 结构化输出
  # 注意: temperature 默认 0.5，部分模型必须传 max_tokens
  # --------------------------------------------------------------------------
  nvidia:
    baseUrl: "https://integrate.api.nvidia.com/v1"
    apiKey: "${NVIDIA_API_KEY}"
    models: []

  # --------------------------------------------------------------------------
  # ModelScope 魔搭 - 官网：https://www.modelscope.cn/
  # Token: https://www.modelscope.cn/my/acount
  # 模型: 使用 ModelScope Model ID，如 Qwen/Qwen3.5-35B-A3B
  # --------------------------------------------------------------------------
  modelscope:
    baseUrl: "https://api-inference.modelscope.cn/v1"
    apiKey: "${MODELSCOPE_ACCESS_TOKEN}"
    models: []

# ============================================================================
# 工具配置
# ============================================================================
tools:
  enabled: []                   # 启用的工具列表（留空表示全部启用）
  disabled: []                  # 禁用的工具列表
  config:
    shell:
      allowedCommands: []       # 允许的命令白名单（留空表示全部禁止）
      blockedCommands: []      # 禁止的命令黑名单

# ============================================================================
# 消息通道配置
# ============================================================================
#
# 所有 Channel 使用官方 SDK 的 WebSocket/Stream 模式
# 无需公网服务器，无需配置回调地址
# 凭证为空时该 Channel 不会启动
#
# 权限控制：
#   allowFrom: ["*"]       # 允许所有用户
#   allowFrom: ["user1"]   # 仅允许 user1
#   allowFrom: []          # 禁止所有用户
#
# ----------------------------------------------------------------------------

channels:
  # --------------------------------------------------------------------------
  # QQ 频道机器人 - https://bot.q.qq.com/
  # 开通: 创建应用 → 获取 AppID/ClientSecret → 沙箱配置 → 开通 Intents
  #
  # Required Intents:
  #   - GUILDS (接收频道消息)
  #   - PUBLIC_GUILD_MESSAGES (接收公开频道消息)
  # 其他事件根据需求开通
  # --------------------------------------------------------------------------
  qq:
    enabled: false
    appId: ""
    clientSecret: ""
    sandbox: true
    allowChannels: []
    allowFrom: []

  # --------------------------------------------------------------------------
  # 飞书机器人 - https://open.feishu.cn/
  # 开通: 创建应用 → 获取 AppID/AppSecret → 开通权限 → 发布
  # 安装: bun add @larksuiteoapi/node-sdk
  #
  # Required Permissions:
  #   - im:message (接收消息)
  #   - im:message.receive_v1 (事件订阅)
  #   - 开启 Stream 模式 (WebSocket 长连接，无需公网 IP)
  # --------------------------------------------------------------------------
  feishu:
    enabled: false
    appId: ""
    appSecret: ""
    allowFrom: []

  # --------------------------------------------------------------------------
  # 企业微信机器人 - https://developer.work.weixin.qq.com/
  # 开通: 创建应用 → 获取 BotID/Secret → 发布
  # 安装: bun add @wecom/aibot-node-sdk
  #
  # Mode: API 模式机器人 (WebSocket 长连接)
  #   - 获取 AgentId 和 Secret
  #   - 使用企业级应用授权登录
  # --------------------------------------------------------------------------
  wechatWork:
    enabled: false
    botId: ""
    secret: ""
    allowFrom: []

  # --------------------------------------------------------------------------
  # 钉钉机器人 - https://open-dev.dingtalk.com/
  # 开通: 创建应用 → 获取 AppKey/AppSecret → 开通权限 → 配置 Stream 模式
  # 安装: bun add dingtalk-stream-sdk-nodejs
  #
  # Mode: Stream 模式 (推荐，无需公网 IP，WebSocket 长连接)
  # Required Permissions:
  #   - Card.Streaming.Write (流式卡片)
  #   - Card.Instance.Write (卡片实例)
  #   - qyapi_robot_sendmsg (发送消息)
  # --------------------------------------------------------------------------
  dingtalk:
    enabled: false
    clientId: ""
    clientSecret: ""
    allowFrom: []

# ============================================================================
# 会话配置
# ============================================================================
sessions:
  contextWindowTokens: 65535    # 上下文窗口大小（tokens）
  compressionTokenThreshold: 0.7  # 压缩阈值（0-1），达到此比例触发压缩

  compression:
    strategy: hybrid            # 压缩策略: sliding-window | summarization | hybrid
    keepRecentMessages: 10      # hybrid 策略保留的最近消息数
    # summaryMaxTokens: 1000     # 摘要最大 token 数（绝对值或百分比如 "10%"）
    enabled: true               # 是否启用压缩

  persist: true                  # 会话持久化，重启后可恢复上下文

# ============================================================================
# 日志配置
# ============================================================================
logs:
  sanitize: true                 # 敏感信息脱敏（apiKey、token 等替换为 ***）
  maxFileSize: 10               # 单个日志文件最大大小（MB）
  level: info                   # 控制台日志级别: debug | info | warning | error
  granularity: 1H              # 日志文件时间粒度: 30M ~ 7D（数值+单位）
