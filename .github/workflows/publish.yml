name: Publish to npm

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Configure npm provenance
        run: npm config set provenance true

      - name: Check if version changed
        id: check-version
        run: |
          # 获取本地版本
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          # 检查 npm 上是否已存在该版本
          NPM_VERSION=$(npm view micro-agent version 2>/dev/null || echo "0.0.0")
          
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "📦 版本变化: $NPM_VERSION -> $LOCAL_VERSION"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "⚠️ 版本未变化: $LOCAL_VERSION，跳过发布"
          fi

      - name: Publish packages
        if: steps.check-version.outputs.should_publish == 'true'
        run: |
          # 按依赖顺序发布
          echo "📦 发布 @micro-agent/types"
          npm publish --workspace=@micro-agent/types --access public
          
          echo "📦 发布 @micro-agent/config"
          npm publish --workspace=@micro-agent/config --access public
          
          echo "📦 发布 @micro-agent/storage"
          npm publish --workspace=@micro-agent/storage --access public
          
          echo "📦 发布 @micro-agent/extension-system"
          npm publish --workspace=@micro-agent/extension-system --access public
          
          echo "📦 发布 @micro-agent/providers"
          npm publish --workspace=@micro-agent/providers --access public
          
          echo "📦 发布 @micro-agent/runtime"
          npm publish --workspace=@micro-agent/runtime --access public
          
          echo "📦 发布 @micro-agent/sdk"
          npm publish --workspace=@micro-agent/sdk --access public
          
          echo "📦 发布 @micro-agent/server"
          npm publish --workspace=@micro-agent/server --access public
          
          echo "📦 发布 @micro-agent/cli"
          npm publish --workspace=@micro-agent/cli --access public
          
          echo "📦 发布 @micro-agent/core"
          npm publish --access public
          
          echo "✅ 发布完成！"

      - name: Create Git Tag
        if: steps.check-version.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check-version.outputs.local_version }}" -m "Release v${{ steps.check-version.outputs.local_version }}"
          git push origin "v${{ steps.check-version.outputs.local_version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check-version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.local_version }}
          name: Release v${{ steps.check-version.outputs.local_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
