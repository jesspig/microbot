name: Publish to npm

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Configure npm auth
        run: |
          bun config set registry https://registry.npmjs.org
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if version changed
        id: check-version
        run: |
          # 使用 bun 获取本地版本
          LOCAL_VERSION=$(bun -e "console.log(require('./package.json').version)")
          
          # 使用 bun 检查 npm 上是否已存在该版本
          NPM_VERSION=$(bun x npm-view @micro-agent/core version 2>/dev/null || echo "0.0.0")
          
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "📦 版本变化: $NPM_VERSION -> $LOCAL_VERSION"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "⚠️ 版本未变化: $LOCAL_VERSION，跳过发布"
          fi

      - name: Publish packages
        if: steps.check-version.outputs.should_publish == 'true'
        run: |
          # 按依赖顺序发布 (bun publish 会自动将 workspace:* 转换为实际版本)
          # 1. 发布 agent-service (最底层，无 workspace 依赖)
          echo "📦 发布 @micro-agent/agent-service"
          bun publish --cwd agent-service --access public --no-git-checks
          
          # 2. 发布 client-sdk (依赖 agent-service)
          echo "📦 发布 @micro-agent/client-sdk"
          bun publish --cwd sdk --access public --no-git-checks
          
          # 3. 发布 cli-app (依赖 client-sdk)
          echo "📦 发布 @micro-agent/cli-app"
          bun publish --cwd applications/cli --access public --no-git-checks
          
          # 4. 发布 core (根目录，依赖所有)
          echo "📦 发布 @micro-agent/core"
          bun publish --access public --no-git-checks
          
          echo "✅ 发布完成！"
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git Tag
        if: steps.check-version.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check-version.outputs.local_version }}" -m "Release v${{ steps.check-version.outputs.local_version }}"
          git push origin "v${{ steps.check-version.outputs.local_version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check-version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.local_version }}
          name: Release v${{ steps.check-version.outputs.local_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}