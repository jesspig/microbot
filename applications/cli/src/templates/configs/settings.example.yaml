# ═══════════════════════════════════════════════════════════════════════════════
# MicroAgent 配置文件
# ═══════════════════════════════════════════════════════════════════════════════
# 编辑此文件配置你的模型提供商
#
# 环境变量：支持 ${VAR_NAME} 语法，如 ${OPENAI_API_KEY}
# 文档：https://micro-agent.dev/config
# ═══════════════════════════════════════════════════════════════════════════════

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ Agent 配置                                                                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
agents:
  # 工作区路径：存储会话、记忆、缓存等数据
  # 默认：~/.micro-agent/workspace
  # workspace: ~/.micro-agent/workspace

  # ─────────────────────────────────────────────────────────────────────────
  # 模型配置【必填】
  # 格式：<provider>/<model>，provider 需在下方 providers 中定义
  #
  # ┌──────────┬─────────────────────────────────┬───────────────────────────┐
  # │ 字段     │ 说明                           │ 是否必填                  │
  # ├──────────┼─────────────────────────────────┼───────────────────────────┤
  # │ chat     │ 对话模型，处理常规对话          │ 必填                      │
  # │ tool     │ 工具调用模型，执行工具          │ 可选，默认用 chat         │
  # │ embed    │ 嵌入模型，向量检索              │ 可选，禁用则用全文检索    │
  # │ vision   │ 视觉模型，处理图片识别          │ 可选，不配置则禁用视觉    │
  # │ coder    │ 编程模型，处理代码编写          │ 可选，默认用 chat         │
  # │ intent   │ 意图识别模型，判断任务类型      │ 可选，默认用 chat         │
  # └──────────┴─────────────────────────────────┴───────────────────────────┘
  # ─────────────────────────────────────────────────────────────────────────
  models:
    chat: ollama/qwen3.5:2b # 必填，格式：<provider>/<model>
    # tool: ollama/qwen3        # 可选，工具调用模型
    embed: ollama/qwen3-embedding:0.6b # 可选，嵌入模型
    # vision: ollama/qwen3-vl   # 可选，视觉模型
    # coder: ollama/qwen3       # 可选，编程模型
    # intent: ollama/qwen3      # 可选，意图识别模型

  # ─────────────────────────────────────────────────────────────────────────
  # 记忆系统配置（可选）
  # 启用后 Agent 会记住历史对话，支持跨会话检索
  #
  # ┌─────────────────────┬─────────────────────────────────┬─────────────────┐
  # │ 字段                │ 说明                            │ 默认值          │
  # ├─────────────────────┼─────────────────────────────────┼─────────────────┤
  # │ enabled             │ 是否启用                        │ false           │
  # │ storagePath         │ 存储路径                        │ ~/.micro-agent/memory │
  # │ shortTerm           │ 短期记忆配置                    │ 见下方          │
  # │ longTerm            │ 长期记忆配置                    │ 见下方          │
  # │ retrieval           │ 检索配置                        │ 见下方          │
  # │ consolidation       │ 记忆整合配置                    │ 见下方          │
  # │ multiEmbed          │ 多嵌入模型配置                  │ 见下方          │
  # └─────────────────────┴─────────────────────────────────┴─────────────────┘
  # ─────────────────────────────────────────────────────────────────────────
  memory:
    enabled: true
    # storagePath: ~/.micro-agent/memory

    # 短期记忆：会话历史、近期操作
    # shortTerm:
    #   maxMessages: 100           # 最大消息数
    #   retentionDays: 7           # 保留天数
    #   compressThreshold: 50      # 触发压缩的消息阈值
    #   idleTimeoutMs: 300000      # 空闲超时（毫秒）

    # 长期记忆：偏好、事实、决策
    # longTerm:
    #   vectorStore: lancedb       # 向量存储后端
    #   forgettingHalfLife: 30     # 遗忘半衰期（天）
    #   importanceThreshold: 0.3   # 重要性阈值

    # 检索配置：向量+全文混合检索
    # retrieval:
    #   mode: auto                 # 模式：auto(自适应)/vector/fulltext/hybrid
    #                              # auto: 根据embed配置自动选择，未配置用全文检索
    #   defaultLimit: 10           # 默认返回数量
    #   maxLimit: 50               # 最大返回数量
    #   minScore: 0.0              # 最小相似度阈值
    #   vectorWeight: 1.0          # 向量检索权重（hybrid模式）
    #   fulltextWeight: 1.0        # 全文检索权重（hybrid模式）
    #   rrfK: 60                   # RRF 融合常数 K
    #   decayHalfLife: 30          # 时间衰减半衰期（天）

    # 记忆整合：短期→长期自动转化
    # consolidation:
    #   messageThreshold: 20       # 触发整合的消息阈值
    #   idleTimeout: 300000        # 空闲超时触发（毫秒）
    #   eventDriven: true          # 是否启用事件驱动整合
    #   retentionDays: 30          # 整合后保留原始消息的天数
    #   maxSummaryLength: 500      # 最大摘要长度

    # 分块配置：文档分块策略
    # chunking:
    #   chunkSize: 1500            # 分块大小
    #   chunkOverlap: 150          # 分块重叠
    #   strategy: recursive        # 分块策略：fixed/recursive/semantic
    #   separators:                # 递归分块分隔符（recursive模式）
    #     - "\n\n"
    #     - "\n"
    #     - " "
    #     - ""

    # 多嵌入模型配置：支持模型切换和向量迁移
    # multiEmbed:
    #   enabled: false             # 是否启用多模型支持
    #   maxModels: 3               # 最大保留模型数
    #   autoMigrate: true          # 切换模型时自动迁移向量
    #   batchSize: 100             # 迁移批次大小
    #   migrateInterval: 1000      # 迁移批次间隔（毫秒）

    # 会话上下文管理
    # session:
    #   contextInjection: auto     # 上下文注入模式：auto/manual/disabled
    #   maxHistoryMessages: 20     # 最大注入历史消息数
    #   maxRelatedSessions: 3      # 最大注入相关会话数
    #   autoTitle: true            # 自动生成会话标题
    #   retentionDays: 30          # 会话保留天数

  # ─────────────────────────────────────────────────────────────────────────
  # 引用溯源配置（可选）
  # 知识库检索时标注来源，帮助用户追溯信息出处
  # ─────────────────────────────────────────────────────────────────────────
  citation:
    enabled: true # 是否启用引用溯源
    # minConfidence: 0.5              # 最小置信度阈值 (0-1)，低于此值不生成引用
    # maxCitations: 5                 # 最大引用数量
    # format: numbered                # 引用格式: numbered(编号), bracket(方括号), footnote(脚注)
    # maxSnippetLength: 200           # 引用片段最大长度（字符数）

  # ─────────────────────────────────────────────────────────────────────────
  # 生成参数（可选，有默认值）
  # ─────────────────────────────────────────────────────────────────────────
  # maxTokens: 512           # 最大生成长度，范围 1-8192
  # temperature: 0.7         # 温度，范围 0-1.5，越低越确定
  # topK: 50                 # Top-K 采样
  # topP: 0.7                # Top-P 核采样
  # frequencyPenalty: 0.5    # 频率惩罚 0-2
  # maxToolIterations: 20    # 工具调用最大迭代次数

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ Provider 配置【必填，至少配置一个】                                         ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# providers.models 只需列出模型ID，能力在 agents.models 中指定
#
# ┌───────────┬─────────────────────────────────┬─────────────────────────────┐
# │ 字段      │ 说明                            │ 是否必填                    │
# ├───────────┼─────────────────────────────────┼─────────────────────────────┤
# │ baseUrl   │ API 地址                        │ 必填                        │
# │ apiKey    │ API 密钥，支持 ${VAR_NAME}       │ 部分需要                    │
# │ models    │ 模型ID列表                      │ 必填                        │
# └───────────┴─────────────────────────────────┴─────────────────────────────┘
providers:
  # ═════════════════════════════════════════════════════════════════════════
  # 本地模型：Ollama（推荐入门）
  # 安装：https://ollama.ai
  # 特点：无需 apiKey，本地运行，隐私安全
  # ═════════════════════════════════════════════════════════════════════════
  ollama:
    baseUrl: http://localhost:11434/v1
    models:
      - qwen3.5:2b
      - qwen3-embedding:0.6b

  # ═════════════════════════════════════════════════════════════════════════
  # 智谱 GLM（bigmodel.cn）
  # 文档：https://open.bigmodel.cn/dev/api
  # ═════════════════════════════════════════════════════════════════════════
  # glm:
  #   baseUrl: https://open.bigmodel.cn/api/paas/v4
  #   apiKey: ${GLM_API_KEY}
  #   models:
  #     - glm-5
  #     - glm-4.7

  # ═════════════════════════════════════════════════════════════════════════
  # DeepSeek
  # 文档：https://platform.deepseek.com/docs
  # ═════════════════════════════════════════════════════════════════════════
  # deepseek:
  #   baseUrl: https://api.deepseek.com/v1
  #   apiKey: ${DEEPSEEK_API_KEY}
  #   models:
  #     - deepseek-chat
  #     - deepseek-reasoner

  # ═════════════════════════════════════════════════════════════════════════
  # MiniMax（海螺 AI）
  # 文档：https://platform.minimax.io/docs
  # ═════════════════════════════════════════════════════════════════════════
  # minimax:
  #   baseUrl: https://api.minimax.chat/v1
  #   apiKey: ${MINIMAX_API_KEY}
  #   models:
  #     - minimax-m2.1

  # ═════════════════════════════════════════════════════════════════════════
  # Moonshot Kimi
  # 文档：https://platform.moonshot.cn/docs
  # ═════════════════════════════════════════════════════════════════════════
  # kimi:
  #   baseUrl: https://api.moonshot.cn/v1
  #   apiKey: ${MOONSHOT_API_KEY}
  #   models:
  #     - kimi-k2.5

  # ═════════════════════════════════════════════════════════════════════════
  # OpenAI 及兼容接口
  # ═════════════════════════════════════════════════════════════════════════
  # openai:
  #   baseUrl: https://api.openai.com/v1
  #   apiKey: ${OPENAI_API_KEY}
  #   models:
  #     - gpt-4o-mini
  #     - gpt-4o

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ Channel 配置（可选）                                                        ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# 消息通道，将 Agent 接入飞书、钉钉等外部平台
#
# ┌───────────┬─────────────────────────────────┬─────────────────────────────┐
# │ 字段      │ 说明                            │ 是否必填                    │
# ├───────────┼─────────────────────────────────┼─────────────────────────────┤
# │ enabled   │ 是否启用                        │ 可选，默认 false            │
# │ appId     │ 应用 ID                         │ 启用时必填                  │
# │ appSecret │ 应用密钥                        │ 启用时必填                  │
# │ allowFrom │ 消息来源白名单                  │ 可选                        │
# └───────────┴─────────────────────────────────┴─────────────────────────────┘
channels:
  # 飞书机器人
  # 文档：https://micro-agent.dev/extensions/channels#飞书
  # feishu:
  #   enabled: true
  #   appId: cli_xxxx
  #   appSecret: xxxx
  #   allowFrom: []

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ Workspaces 配置（可选）                                                     ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# 工作区列表：限制 Agent 只能访问指定目录
# 未配置时，Agent 只能访问 agents.workspace 目录
# workspaces:
#   - ~/projects/my-project
#   - path: ~/Documents
#     name: 文档
#     description: 个人文档目录

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ KnowledgeBase 配置（可选）                                                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# 知识库系统：将文档上传到知识库，Agent 可检索文档内容
# 文档存放在 ~/.micro-agent/knowledge/ 目录
#
# ┌─────────────────┬─────────────────────────────────┬─────────────────────────┐
# │ 字段            │ 说明                            │ 默认值                  │
# ├─────────────────┼─────────────────────────────────┼─────────────────────────┤
# │ enabled         │ 是否启用                        │ true                    │
# │ basePath        │ 知识库存储路径                  │ ~/.micro-agent/knowledge│
# │ chunkSize       │ 文档分块大小                    │ 1000                    │
# │ chunkOverlap    │ 分块重叠大小                    │ 200                     │
# │ maxSearchResults│ 最大搜索结果数                  │ 5                       │
# │ minSimilarityScore│ 最小相似度阈值               │ 0.5                     │
# │ buildInterval   │ 后台构建间隔（毫秒）            │ 5000                    │
# │ embedModel      │ 嵌入模型（默认用 agents.models.embed）│ -                   │
# └─────────────────┴─────────────────────────────────┴─────────────────────────┘
# knowledgeBase:
#   enabled: true
#   basePath: ~/.micro-agent/knowledge
#   chunkSize: 1000
#   chunkOverlap: 200
#   maxSearchResults: 5
#   minSimilarityScore: 0.5
